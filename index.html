<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NAU Students Hub – Connect, Learn, and Share</title>
    <meta 
      name="description" 
      content="NAU Students Hub is a community platform for North American University students to share reviews, post discussions, explore guides, and connect with fellow students." 
    />
    <meta name="author" content="NAU Students Hub" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" 
      rel="stylesheet"
    />

    <!-- Social / OpenGraph -->
    <meta property="og:title" content="NAU Students Hub" />
    <meta 
      property="og:description" 
      content="A modern community for North American University students — reviews, playbooks, discussions, and more." 
    />
    <meta property="og:type" content="website" />

    <!-- Replace this with your own hosted image later -->
    <meta property="og:image" content="/opengraph-default.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta 
      name="twitter:title" 
      content="NAU Students Hub" 
    />
    <meta 
      name="twitter:description" 
      content="A community platform created by NAU students, for NAU students." 
    />
    <meta name="twitter:image" content="/opengraph-default.png" />
  </head>
